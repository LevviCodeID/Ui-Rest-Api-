<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontak - LevviCode API</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="/">LevviCode API</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/categories">Category</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="/contact">Kontak</a>
          </li>
        </ul>
        <div class="d-flex">
          <button id="themeToggle" class="btn btn-sm btn-outline-light">
            <i class="bi bi-moon-fill"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="content-wrapper">
    <div class="container py-5">
      <h1 class="text-center mb-5">Kontak Kami</h1>
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card p-4">
            <div class="d-flex align-items-center mb-3">
              <i class="bi bi-envelope-fill fs-1 text-primary me-3"></i>
              <div>
                <h5>Email</h5>
                <p class="text-secondary mb-0">support@levvicode.cloud</p>
              </div>
            </div>
            <div class="d-flex align-items-center mb-3">
              <i class="bi bi-telegram fs-1 text-primary me-3"></i>
              <div>
                <h5>Telegram</h5>
                <p class="text-secondary mb-0">@levvicode</p>
              </div>
            </div>
            <div class="d-flex align-items-center">
              <i class="bi bi-github fs-1 text-primary me-3"></i>
              <div>
                <h5>GitHub</h5>
                <p class="text-secondary mb-0">github.com/levvicode</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 LevviCode. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>

</html>
