<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Categories - LevviCode REST API</title>
  <meta name="description" content="Browse all API categories available in LevviCode REST API including downloader, search, tools, and bot endpoints.">
  <meta name="keywords" content="api categories, rest api endpoints, levvicode api categories, public api endpoints">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://restapi.levvicode.cloud/categories">
  <meta property="og:title" content="API Categories - LevviCode REST API">
  <meta property="og:image" content="/images/logo2.png">
  <meta property="og:url" content="https://api.levvicode.cloud/categories">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="LevviCode API">
  <meta name="twitter:description" content="High performance public API for modern apps.">
  <meta name="twitter:image" content="/images/logo2.png">
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "CollectionPage",
 "name": "LevviCode API Categories",
 "url": "https://restapi.levvicode.cloud/categories",
 "description": "Browse all API categories from LevviCode REST API."
}
</script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center fw-bold" href="/">
        <img src="/images/logo.png" alt="logo" width="45" height="45" class="me-1">
        Rest Api
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="/categories">Category</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/#contact">Kontak</a>
          </li>
        </ul>
        <div class="d-flex ms-lg-3 align-items-center gap-2">
          <div class="position-relative">
            <button id="navbarSearchBtn" class="btn btn-sm btn-outline-light" type="button">
              <i class="bi bi-search"></i>
            </button>
            <div id="navbarSearchInput" class="position-absolute top-100 end-0 mt-1" style="display: none; z-index: 1000;">
              <input type="text" id="globalSearchInput" class="form-control" placeholder="Search categories..." style="width: 250px;">
            </div>
          </div>
          <button id="themeToggle" class="btn btn-sm btn-outline-light">
            <i class="bi bi-moon-fill"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="content-wrapper">
    <div class="container my-4" style="padding-top: 70px;">
      <div id="list-view" style="display: none;">
        <h1 class="text-center mb-5">All Categories</h1>
        <div class="row justify-content-center mb-4">
          <div class="col-md-6">
            <div class="input-group">
              <input type="text" id="searchCategory" class="form-control" placeholder="Cari kategori..." onkeyup="filterCategories()">
              <button class="btn btn-search" type="button" onclick="filterCategories()">
                <i class="bi bi-search"></i> Cari
              </button>
            </div>
          </div>
        </div>
        <div id="categories-container" class="row g-4">
          <div class="col-md-4 col-sm-6"><div class="skeleton skeleton-category-card"></div></div>
          <div class="col-md-4 col-sm-6"><div class="skeleton skeleton-category-card"></div></div>
          <div class="col-md-4 col-sm-6"><div class="skeleton skeleton-category-card"></div></div>
        </div>
      </div>
      <div id="detail-view" style="display: none;">
        <h1 class="text-center mb-5" id="category-title"></h1>
        <div class="row justify-content-center mb-4">
          <div class="col-md-6">
            <div class="input-group">
              <input type="text" id="searchEndpoint" class="form-control" placeholder="Cari endpoint (path atau deskripsi)..." onkeyup="filterEndpoints()">
              <button class="btn btn-search" type="button" onclick="filterEndpoints()">
                <i class="bi bi-search"></i> Cari
              </button>
            </div>
          </div>
        </div>
        <div id="endpoints-container" class="row g-4">
          <div class="col-12"><div class="skeleton skeleton-endpoint-card"></div></div>
          <div class="col-12"><div class="skeleton skeleton-endpoint-card"></div></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="d-flex justify-content-center gap-3 mb-2">
        <a href="mailto:support@levvicode.cloud" class="text-secondary" target="_blank"><i class="bi bi-envelope-fill fs-5"></i></a>
        <a href="https://t.me/levvicode" class="text-secondary" target="_blank"><i class="bi bi-telegram fs-5"></i></a>
        <a href="https://github.com/levvicode" class="text-secondary" target="_blank"><i class="bi bi-github fs-5"></i></a>
      </div>
      <p>&copy; 2025 LevviCode. All rights reserved.</p>
    </div>
  </footer>

  <div class="modal fade" id="responseModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title">Response</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-2"><strong>Request URL:</strong> <code id="requestUrl" style="word-break: break-all; color: var(--accent-primary); background-color: var(--bg-primary); padding: 0.25rem 0.5rem; border-radius: 4px; display: inline-block; max-width: 100%;"></code></div>
          <div class="mb-2"><strong>Status:</strong> <span id="responseStatus"></span></div>
          <div class="response-area" id="responseContent"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
  <script>
    let currentEndpoints = [];

    const navbarSearchBtn = document.getElementById('navbarSearchBtn');
    const navbarSearchInput = document.getElementById('navbarSearchInput');
    if (navbarSearchBtn) {
      navbarSearchBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        navbarSearchInput.style.display = navbarSearchInput.style.display === 'none' ? 'block' : 'none';
        if (navbarSearchInput.style.display === 'block') {
          document.getElementById('globalSearchInput').focus();
        }
      });
      document.addEventListener('click', (e) => {
        if (!navbarSearchBtn.contains(e.target) && !navbarSearchInput.contains(e.target)) {
          navbarSearchInput.style.display = 'none';
        }
      });
    }

    const mode = new URLSearchParams(window.location.search).get('mode') || (window.location.pathname === '/categories' ? 'list' : 'detail');
    if (mode === 'list') {
      document.getElementById('list-view').style.display = 'block';
      document.title = 'All Categories - LevviCode API';
      renderList();
      const globalSearch = document.getElementById('globalSearchInput');
      if (globalSearch) {
        globalSearch.addEventListener('keyup', () => {
          const val = globalSearch.value.toLowerCase();
          const cards = document.querySelectorAll('#categories-container .category-card');
          cards.forEach(card => {
            const title = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = title.includes(val) ? 'block' : 'none';
          });
        });
      }
    } else if (mode === 'detail') {
      document.getElementById('detail-view').style.display = 'block';
      const categoryName = decodeURIComponent(window.location.pathname.split('/')[2] || '');
      document.getElementById('category-title').innerText = categoryName;
      document.title = categoryName + ' - LevviCode API';
      renderDetail(categoryName);
    } else {
      window.location.href = '/';
    }

    async function renderList() {
      const baseUrl = 'https://api.levvicode.cloud';
      try {
        const catRes = await fetch(baseUrl + '/api/categories?_=' + Date.now());
        const catData = await catRes.json();
        if (catData.status) {
          const container = document.getElementById('categories-container');
          const fallbackIcons = ['bi-globe','bi-download','bi-search','bi-tools','bi-camera','bi-music-note','bi-film','bi-file-earmark-text','bi-image','bi-code-slash','bi-hdd-stack','bi-wifi','bi-shield-check','bi-star','bi-heart','bi-bell','bi-calendar','bi-chat'];
          const iconMap = {
            'ai': 'bi-cpu',
            'downloader': 'bi-download',
            'maker': 'bi-tools',
            'search': 'bi-search',
            'tools': 'bi-gear',
            'stalker': 'bi-eye',
            'bot': 'bi-robot',
            'image': 'bi-image',
            'video': 'bi-film',
            'audio': 'bi-music-note',
            'text': 'bi-file-text',
            'utility': 'bi-wrench',
            'random': 'bi-shuffle'
          };
          let html = '';
          catData.categories.forEach((cat, i) => {
            const iconClass = iconMap[cat.name.toLowerCase()] || fallbackIcons[i % fallbackIcons.length];
            html += `<div class="col-md-4 col-sm-6"><div class="category-card" onclick="window.location.href='/category/${encodeURIComponent(cat.name)}'"><i class="bi ${iconClass} icon"></i><h3>${cat.name}</h3><p>${cat.count} endpoints</p></div></div>`;
          });
          container.innerHTML = html;
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function renderDetail(category) {
      const baseUrl = 'https://api.levvicode.cloud';
      try {
        const res = await fetch(baseUrl + '/api/categories/' + encodeURIComponent(category) + '/endpoints?_=' + Date.now());
        const data = await res.json();
        if (!data.status) {
          document.getElementById('endpoints-container').innerHTML = '<p class="text-center text-secondary">Category not found.</p>';
          return;
        }
        currentEndpoints = data.endpoints;
        renderEndpointList(currentEndpoints);
      } catch (err) {
        console.error(err);
        document.getElementById('endpoints-container').innerHTML = '<p class="text-center text-secondary">Error loading category.</p>';
      }
    }

    function renderEndpointList(endpoints) {
      const container = document.getElementById('endpoints-container');
      let html = '';
      endpoints.forEach((ep, idx) => {
        const params = Object.entries(ep.parameters).map(([k,d]) => `<div class="param-item"><code>${k}</code> — ${d}</div>`).join('');
        const formId = `tryForm-${idx}`;
        let formHtml = '';
        if (ep.method === 'GET') {
          formHtml = Object.keys(ep.parameters).map(k => `<div class="mb-2"><label class="form-label">${k}</label><input type="text" class="form-control" id="input-${ep.path}-${k}" placeholder="${ep.parameters[k]}"></div>`).join('') + `<button class="btn-primary w-100 mt-2" onclick="tryEndpoint('${ep.path}', 'GET', {${Object.keys(ep.parameters).map(k => `'${k}': document.getElementById('input-${ep.path}-${k}').value`).join(',')}})"><i class="bi bi-send"></i> Try GET</button>`;
        } else {
          formHtml = Object.keys(ep.parameters).map(k => `<div class="mb-2"><label class="form-label">${k}</label><input type="text" class="form-control" id="input-${ep.path}-${k}" placeholder="${ep.parameters[k]}"></div>`).join('') + `<button class="btn-primary w-100 mt-2" onclick="tryEndpoint('${ep.path}', 'POST', {${Object.keys(ep.parameters).map(k => `'${k}': document.getElementById('input-${ep.path}-${k}').value`).join(',')}})"><i class="bi bi-send"></i> Try POST</button>`;
        }
        html += `<div class="col-12 endpoint-item" data-path="${ep.path.toLowerCase()}" data-desc="${ep.description.toLowerCase()}"><div class="card endpoint-card"><div class="endpoint-header"><h5 class="text-break">${ep.path}</h5><span class="method-badge method-${ep.method}">${ep.method}</span></div><p class="text-secondary mb-3">${ep.description}</p><button class="try-btn" type="button" data-bs-toggle="collapse" data-bs-target="#${formId}" aria-expanded="false"><i class="bi bi-play-fill"></i> TRY IT OUT</button><div class="collapse try-form-content" id="${formId}"><div class="try-form"><h6><i class="bi bi-sliders2 section-icon"></i> Parameters</h6>${params||'<p class="text-muted">No parameters</p>'}${formHtml}</div></div><div class="mt-3"><button class="btn-outline w-100" type="button" data-bs-toggle="collapse" data-bs-target="#status-${idx}" aria-expanded="false"><i class="bi bi-list-ul section-icon"></i> HTTP STATUS CODES</button><div class="collapse mt-2" id="status-${idx}"><table class="status-table">
    <tr><td><div class="status-code code-200"><i class="bi bi-check-circle-fill"></i> 200</div></td><td>OK - Request successful</td></tr>
    <tr><td><div class="status-code code-400"><i class="bi bi-exclamation-circle-fill"></i> 400</div></td><td>Bad Request - Invalid parameters or missing required fields</td></tr>
    <tr><td><div class="status-code code-405"><i class="bi bi-ban"></i> 405</div></td><td>Method Not Allowed - HTTP method not supported</td></tr>
    <tr><td><div class="status-code code-429"><i class="bi bi-hourglass-split"></i> 429</div></td><td>Too Many Requests - Rate limit exceeded</td></tr>
    <tr><td><div class="status-code code-500"><i class="bi bi-bug-fill"></i> 500</div></td><td>Internal Server Error - Server encountered an error</td></tr>
</table></div></div></div></div>`;
      });
      container.innerHTML = html;
    }

    function filterEndpoints() {
      const searchTerm = document.getElementById('searchEndpoint').value.toLowerCase();
      const filtered = currentEndpoints.filter(ep => 
        ep.path.toLowerCase().includes(searchTerm) || 
        ep.description.toLowerCase().includes(searchTerm)
      );
      renderEndpointList(filtered);
    }

    async function tryEndpoint(path, method, formData) {
      const baseUrl = 'https://api.levvicode.cloud';
      let url = baseUrl + path;
      const options = { method, headers: { 'Content-Type': 'application/json' } };
      if (method === 'POST') {
        options.body = JSON.stringify(formData);
      } else {
        url += '?' + new URLSearchParams(formData).toString();
        window.open(url, '_blank');
        return;
      }
      try {
        const res = await fetch(url, options);
        const data = await res.json();
        document.getElementById('requestUrl').textContent = url;
        document.getElementById('responseContent').textContent = JSON.stringify(data, null, 2);
        document.getElementById('responseStatus').textContent = res.status + ' ' + res.statusText;
        new bootstrap.Modal(document.getElementById('responseModal')).show();
      } catch (err) {
        document.getElementById('requestUrl').textContent = url;
        document.getElementById('responseContent').textContent = 'Error: ' + err.message;
        new bootstrap.Modal(document.getElementById('responseModal')).show();
      }
    }

    function filterCategories() {
      const input = document.getElementById('searchCategory');
      if (!input) return;
      const filter = input.value.toLowerCase();
      const cards = document.querySelectorAll('#categories-container .category-card');
      cards.forEach(card => {
        const title = card.querySelector('h3').innerText.toLowerCase();
        card.style.display = title.includes(filter) ? 'block' : 'none';
      });
    }
  </script>
</body>
</html>
