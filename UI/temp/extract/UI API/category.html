  <style>
    .endpoint-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .try-btn { background: transparent; border: 1px solid var(--accent-primary); color: var(--accent-primary); border-radius: 20px; padding: 0.2rem 1rem; font-size: 0.85rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.3rem; cursor: pointer; transition: all 0.2s; }
    .try-btn:hover { background-color: var(--accent-primary); color: white; }
    .section-icon { color: var(--accent-secondary); margin-right: 0.5rem; }
    .status-table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    .status-table td { padding: 0.25rem 0.5rem; border-bottom: 1px solid var(--border-color); }
    .status-table td:first-child { width: 80px; }
    .status-code { display: flex; align-items: center; gap: 0.3rem; }
    .status-code i { font-size: 1rem; }
    .code-200 i { color: #4ade80; }
    .code-400 i { color: #f87171; }
    .code-405 i { color: #fbbf24; }
    .code-429 i { color: #fb923c; }
    .code-500 i { color: #ef4444; }
    .param-item { margin-bottom: 0.5rem; }
    .param-item code { color: var(--accent-primary); background: transparent; }
    .try-form-content { margin-top: 1rem; }
  </style>
</head>
<body>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="/categories">Category</a>
          </li>

            <a class="nav-link" href="/#contact">Kontak</a>

  <div class="content-wrapper">
    <div class="container my-4" style="padding-top: 70px;">
      <div id="list-view" style="display: none;">
        <h1 class="text-center mb-5">All Categories</h1>
        <div class="row justify-content-center mb-4">
          <div class="col-md-6">
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
              <input type="text" id="searchCategory" class="form-control border-start-0" placeholder="Cari kategori..." onkeyup="filterCategories()">
            </div>
          </div>
        </div>
        <div id="categories-container" class="row g-4">
          <div class="col-md-4 col-sm-6"><div class="skeleton skeleton-category-card"></div></div>
          <div class="col-md-4 col-sm-6"><div class="skeleton skeleton-category-card"></div></div>
          <div class="col-md-4 col-sm-6"><div class="skeleton skeleton-category-card"></div></div>
        </div>
      </div>
      <div id="detail-view" style="display: none;">
        <h1 class="text-center mb-5" id="category-title"></h1>
        <div id="endpoints-container" class="row g-4">
          <div class="col-12"><div class="skeleton skeleton-endpoint-card"></div></div>
          <div class="col-12"><div class="skeleton skeleton-endpoint-card"></div></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="d-flex justify-content-center gap-3 mb-2">
        <a href="mailto:support@levvicode.cloud" class="text-secondary" target="_blank"><i class="bi bi-envelope-fill fs-5"></i></a>
        <a href="https://t.me/levvicode" class="text-secondary" target="_blank"><i class="bi bi-telegram fs-5"></i></a>
        <a href="https://github.com/levvicode" class="text-secondary" target="_blank"><i class="bi bi-github fs-5"></i></a>
      </div>

  <div class="modal fade" id="responseModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title">Response</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-2"><strong>Request URL:</strong> <code id="requestUrl" style="word-break: break-all; color: var(--accent-primary); background-color: var(--bg-primary); padding: 0.25rem 0.5rem; border-radius: 4px; display: inline-block; max-width: 100%;"></code></div>
          <div class="mb-2"><strong>Status:</strong> <span id="responseStatus"></span></div>
          <div class="response-area" id="responseContent"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const mode = new URLSearchParams(window.location.search).get('mode') || (window.location.pathname === '/categories' ? 'list' : 'detail');
    if (mode === 'list') {
      document.getElementById('list-view').style.display = 'block';
      document.title = 'All Categories - LevviCode API';
      renderList();
    } else if (mode === 'detail') {
      document.getElementById('detail-view').style.display = 'block';
      const categoryName = decodeURIComponent(window.location.pathname.split('/')[2] || '');
      document.getElementById('category-title').innerText = categoryName;
      document.title = categoryName + ' - LevviCode API';
      renderDetail(categoryName);
    } else {
      window.location.href = '/';
    }

    async function renderList() {
      const baseUrl = 'https://api.levvicode.cloud';
      try {
        const catRes = await fetch(baseUrl + '/api/categories?_=' + Date.now());
        const catData = await catRes.json();
        if (catData.status) {
          const container = document.getElementById('categories-container');
          const iconList = ['bi-globe','bi-download','bi-search','bi-tools','bi-camera','bi-music-note','bi-film','bi-file-earmark-text','bi-image','bi-code-slash','bi-hdd-stack','bi-wifi','bi-shield-check','bi-star','bi-heart','bi-bell','bi-calendar','bi-chat'];
          let html = '';
          catData.categories.forEach((cat, i) => {
            html += `<div class="col-md-4 col-sm-6"><div class="category-card" onclick="window.location.href='/category/${encodeURIComponent(cat.name)}'"><i class="bi ${iconList[i%iconList.length]} icon"></i><h3>${cat.name}</h3><p>${cat.count} endpoints</p></div></div>`;
          });
          container.innerHTML = html;
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function renderDetail(category) {
      const baseUrl = 'https://api.levvicode.cloud';
      try {
        const res = await fetch(baseUrl + '/api/categories/' + encodeURIComponent(category) + '/endpoints?_=' + Date.now());
        const data = await res.json();
        if (!data.status) {
          document.getElementById('endpoints-container').innerHTML = '<p class="text-center text-secondary">Category not found.</p>';
          return;
        }
        const container = document.getElementById('endpoints-container');
        let html = '';
        data.endpoints.forEach((ep, idx) => {
          const params = Object.entries(ep.parameters).map(([k,d]) => `<div class="param-item"><code>${k}</code> — ${d}</div>`).join('');
          const formId = `tryForm-${idx}`;
          let formHtml = '';
          if (ep.method === 'GET') {
            formHtml = Object.keys(ep.parameters).map(k => `<div class="mb-2"><label class="form-label">${k}</label><input type="text" class="form-control" id="input-${ep.path}-${k}" placeholder="${ep.parameters[k]}"></div>`).join('') + `<button class="btn-primary w-100 mt-2" onclick="tryEndpoint('${ep.path}', 'GET', {${Object.keys(ep.parameters).map(k => `'${k}': document.getElementById('input-${ep.path}-${k}').value`).join(',')}})"><i class="bi bi-send"></i> Try GET</button>`;
          } else {
            formHtml = Object.keys(ep.parameters).map(k => `<div class="mb-2"><label class="form-label">${k}</label><input type="text" class="form-control" id="input-${ep.path}-${k}" placeholder="${ep.parameters[k]}"></div>`).join('') + `<button class="btn-primary w-100 mt-2" onclick="tryEndpoint('${ep.path}', 'POST', {${Object.keys(ep.parameters).map(k => `'${k}': document.getElementById('input-${ep.path}-${k}').value`).join(',')}})"><i class="bi bi-send"></i> Try POST</button>`;
          }
          html += `<div class="col-12"><div class="card endpoint-card"><div class="endpoint-header"><h5 class="text-break">${ep.path}</h5><span class="method-badge method-${ep.method}">${ep.method}</span></div><p class="text-secondary mb-3">${ep.description}</p><button class="try-btn" type="button" data-bs-toggle="collapse" data-bs-target="#${formId}" aria-expanded="false"><i class="bi bi-play-fill"></i> TRY IT OUT</button><div class="collapse try-form-content" id="${formId}"><div class="try-form"><h6><i class="bi bi-sliders2 section-icon"></i> Parameters</h6>${params||'<p class="text-muted">No parameters</p>'}${formHtml}</div></div><div class="mt-3"><button class="btn-outline w-100" type="button" data-bs-toggle="collapse" data-bs-target="#status-${idx}" aria-expanded="false"><i class="bi bi-list-ul section-icon"></i> HTTP STATUS CODES</button><div class="collapse mt-2" id="status-${idx}"><table class="status-table"><tr><td><div class="status-code code-200"><i class="bi bi-check-circle-fill"></i> 200</div></td><td>OK - Request successfull</td></tr><tr><td><div class="status-code code-400"><i class="bi bi-exclamation-circle-fill"></i> 400</div></td><td>Bad Request - Invalid parameters or missing required fields</td></tr><tr><td><div class="status-code code-405"><i class="bi bi-ban"></i> 405</div></td><td>Method Not Allowed - HTTP method not supported</td></tr><tr><td><div class="status-code code-429"><i class="bi bi-hourglass-split"></i> 429</div></td><td>Too Many Requests - Rate limit exceeded</td></tr><tr><td><div class="status-code code-500"><i class="bi bi-bug-fill"></i> 500</div></td><td>Internal Server Error - Server encountered an error</td></tr></table></div></div></div></div>`;
        });
        container.innerHTML = html;
      } catch (err) {
        console.error(err);
        document.getElementById('endpoints-container').innerHTML = '<p class="text-center text-secondary">Error loading category.</p>';
      }
    }

    async function tryEndpoint(path, method, formData) {
      const baseUrl = 'https://api.levvicode.cloud';
      let url = baseUrl + path;
      const options = { method, headers: { 'Content-Type': 'application/json' } };
      if (method === 'POST') {
        options.body = JSON.stringify(formData);
      } else {
        url += '?' + new URLSearchParams(formData).toString();
        window.open(url, '_blank');
        return;
      }
      try {
        const res = await fetch(url, options);
        const data = await res.json();
        document.getElementById('requestUrl').textContent = url;
        document.getElementById('responseContent').textContent = JSON.stringify(data, null, 2);
        document.getElementById('responseStatus').textContent = res.status + ' ' + res.statusText;
        new bootstrap.Modal(document.getElementById('responseModal')).show();
      } catch (err) {
        document.getElementById('requestUrl').textContent = url;
        document.getElementById('responseContent').textContent = 'Error: ' + err.message;
        new bootstrap.Modal(document.getElementById('responseModal')).show();
      }
    }

    function filterCategories() {
      const input = document.getElementById('searchCategory');
      if (!input) return;
      const filter = input.value.toLowerCase();
      const cards = document.querySelectorAll('#categories-container .category-card');
      cards.forEach(card => {
        const title = card.querySelector('h3').innerText.toLowerCase();
        card.style.display = title.includes(filter) ? 'block' : 'none';
      });
    }
  </script>
</body>
